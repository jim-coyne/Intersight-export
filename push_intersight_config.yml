---
# =============================================================================
# push_intersight_config.yml
# =============================================================================
# Purpose : Re-create select Intersight policies, sub-policies, pools, and
#           optionally profiles from JSON files previously exported by
#           pull_intersight_config.yml.  Designed as a templating system:
#           pull live config, edit/rename exported files as needed, then push
#           them back to the same or a different organization.
#
# Credentials:
#   api-key.txt   – contains the API Key ID  (single line, no trailing newline)
#   SecretKey.txt – contains the EC private key in PEM format
#
# Usage:
#   # Push everything (all resource types that have non-empty export files)
#   ansible-playbook push_intersight_config.yml \
#     -e "target_org=MyOrg"
#
#   # Push only specific resource types (comma-separated)
#   ansible-playbook push_intersight_config.yml \
#     -e "target_org=MyOrg" \
#     -e "push_types=ntp_policies,bios_policies,lan_policies"
#
#   # Dry-run (check mode) – shows what would change without making API calls
#   ansible-playbook push_intersight_config.yml \
#     -e "target_org=MyOrg" --check
#
# Push order matters – dependencies are resolved in this sequence:
#   1. Pools (IP, MAC, UUID, WWN)
#   2. Ethernet / FC sub-policies  (adapter, network, QoS)
#   3. Standalone policies (NTP, SNMP, BIOS, Boot, …)
#   4. LAN / SAN connectivity policies
#   5. vNIC / vHBA interfaces (children of connectivity policies)
#   6. Server Profile Templates
#   7. Server Profiles (unassigned; AssignedServer stripped)
#
# Notes:
#   • The playbook reads the Organization by NAME, not Moid, so the target
#     org must already exist in the destination Intersight account.
#   • Instance-specific fields (Moid, CreateTime, AssignedServer, etc.) are
#     stripped from each object before the POST/PATCH so they do not conflict
#     with existing objects in the target org.
#   • Each push task is idempotent: intersight_rest_api will GET-by-name and
#     PATCH if the object already exists, or POST if it does not.
#   • If an export file is empty or missing, the corresponding task is skipped.
# =============================================================================

- name: Push Intersight Configuration (Templating System)
  hosts: localhost
  gather_facts: false

  vars:
    api_key_id:      "{{ lookup('file', playbook_dir + '/api-key.txt') | trim }}"
    api_private_key: "{{ playbook_dir }}/SecretKey.txt"
    api_uri:         "https://intersight.com/api/v1"
    import_dir:      "{{ playbook_dir }}/exports"

    # Target organization name in the destination account.
    # Override with: -e "target_org=MyOrg"
    target_org: "default"

    # Comma-separated list of resource types to push.
    # Leave blank (default) to push ALL types that have export data.
    # Example: -e "push_types=ntp_policies,bios_policies"
    push_types: ""

    # ---------------------------------------------------------------
    # Fields stripped from every exported object before re-posting.
    # These are instance-specific or read-only in the Intersight API.
    # ---------------------------------------------------------------
    _ro_fields:
      - Moid
      - AccountMoid
      - DomainGroupMoid
      - SharedScope
      - Owners
      - PermissionResources
      - CreateTime
      - ModTime
      - ConfigChangeContext
      - ConfigChangeDetails
      - ConfigChanges
      - ConfigContext
      - ConfigResult
      - DeployedPolicies
      - DeployedSwitches
      - DeployStatus
      - RunningWorkflows
      - ScheduledActions
      - ReservationReferences
      - InternalReservationReferences
      - TemplateActions
      - TemplateSyncErrors
      - TemplateSyncStatus
      - ReportedPolicyChanges
      - PolicyChangeDetails
      - PostDeployAction
      - Ancestors
      - AssignedServer
      - AssociatedServer
      - UuidLease
      - ResourceLease
      - SrcTemplate
      - Profiles
      - Tags
      - UpdateStatus
      - Usage
      - UsageCount
      - PartiallyDeployedPolicies
      - RemovedPolicies
      - ConfigResult

  # ----------------------------------------------------------------
  # Helper macro – used in every push task.
  # Strips read-only fields and injects the target Organization.
  #
  # Usage in api_body:
  #   api_body: "{{ item | intersight_push_body(target_org) }}"
  #
  # Since Jinja custom filters are not available without a plugin,
  # we compute the body inline with combine + difference.
  # ----------------------------------------------------------------

  tasks:
    # ================================================================
    # GUARD: verify the export directory exists
    # ================================================================
    - name: Verify export directory exists
      stat:
        path: "{{ import_dir }}"
      register: _export_dir_stat

    - name: Fail if export directory is missing
      fail:
        msg: >-
          Export directory '{{ import_dir }}' does not exist.
          Run pull_intersight_config.yml first.
      when: not _export_dir_stat.stat.exists

    # ================================================================
    # RESOLVE TARGET ORGANIZATION MOID
    # ================================================================
    - name: Look up target organization Moid
      cisco.intersight.intersight_rest_api:
        api_key_id:      "{{ api_key_id }}"
        api_private_key: "{{ api_private_key }}"
        api_uri:         "{{ api_uri }}"
        resource_path:   /organization/Organizations
        query_params:
          $filter: "Name eq '{{ target_org }}'"
      register: _org_lookup

    - name: Fail if organization not found
      fail:
        msg: "Organization '{{ target_org }}' not found in Intersight"
      when: _org_lookup.api_response is not defined or _org_lookup.api_response.Moid is not defined

    - name: Set target organization Moid
      set_fact:
        target_org_moid: "{{ _org_lookup.api_response.Moid }}"

    # ================================================================
    # SECTION 1 – POOLS
    # ================================================================

    # ---- IP Pools --------------------------------------------------
    - name: Read IP Pools export
      set_fact:
        _ip_pools: "{{ lookup('file', import_dir + '/pools_ip.json', errors='ignore') | default('[]', true) | from_json }}"
      when: push_types == "" or 'pools_ip' in push_types.split(',')

    - name: Push IP Pools
      cisco.intersight.intersight_rest_api:
        api_key_id:      "{{ api_key_id }}"
        api_private_key: "{{ api_private_key }}"
        api_uri:         "{{ api_uri }}"
        resource_path:   /ippool/Pools
        api_body: >-
          {{
            (item | dict2items
             | rejectattr('key', 'in', _ro_fields)
             | list | items2dict)
            | combine({'Name': (name_prefix | default('')) + item.Name + (name_suffix | default('')), 'Organization': {'ClassId': 'mo.MoRef', 'ObjectType': 'organization.Organization', 'Moid': target_org_moid}})
          }}
        update_method: patch
        query_params:
          $filter: "Name eq '{{ (name_prefix | default('')) + item.Name + (name_suffix | default('')) }}'"
      loop: "{{ _ip_pools | default([]) }}"
      when:
        - (push_types == "" or 'pools_ip' in push_types.split(','))
        - item.Name is defined
        - _ip_pools | default([]) | length > 0

    # ---- MAC Pools -------------------------------------------------
